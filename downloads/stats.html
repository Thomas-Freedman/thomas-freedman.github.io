<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Download Stats</title>

    <style>
        body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: rgb(23, 23, 23);
            color: whitesmoke;
            font-size: 1.2em;
        }

        .content {
            max-width: 640px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.6rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .stat-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.9rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .stat-row .label { color: rgba(245,245,245,0.82); }
        .stat-row .count {
            font-size: 1.4rem;
            font-variant-numeric: tabular-nums;
        }

        .note {
            margin-top: 1.6rem;
            font-size: 0.8rem;
            color: rgba(245,245,245,0.45);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Download Stats</h1>
        <div id="stats"></div>
        <p class="note">
            Counts come from clicks on the download links, tracked via
            <a href="https://abacus.jasoncameron.dev" style="color: rgba(185,195,255,0.9);">Abacus</a>.
            Direct links to the .pkg file bypass the counter.
        </p>
    </div>

    <script>
        // One entry per tracked file; the key is the file name lowercased with
        // every run of non-alphanumerics replaced by "-" (same rule as the
        // click tracker on the Sampler's Friend page).
        var counters = [
            {
                label: "Sampler's Friend V1.0.0 — macOS Universal .pkg",
                key: "samplersfriend-1-0-0-macos-universal-pkg"
            }
        ];

        var statsEl = document.getElementById('stats');
        counters.forEach(function (counter) {
            var row = document.createElement('div');
            row.className = 'stat-row';

            var label = document.createElement('span');
            label.className = 'label';
            label.textContent = counter.label;

            var count = document.createElement('span');
            count.className = 'count';
            count.textContent = '…';

            row.appendChild(label);
            row.appendChild(count);
            statsEl.appendChild(row);

            fetch('https://abacus.jasoncameron.dev/get/thomasfreedman-com/' + counter.key)
                .then(function (res) { return res.json(); })
                .then(function (data) { count.textContent = data.value; })
                .catch(function () { count.textContent = 'unavailable'; });
        });
    </script>

</body>
</html>
